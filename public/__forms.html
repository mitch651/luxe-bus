<!DOCTYPE html>
<html>
<head></head>
<body>
  <!-- Trip quote form - for Netlify Forms detection at deploy time -->
  <form name="trip-request" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="trip-request" />
    <input type="text" name="bot-field" />
    <input type="text" name="quote-type" />
    <input type="text" name="trip-type" />
    <input type="text" name="name" />
    <input type="text" name="first-name" />
    <input type="text" name="last-name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="timezone" />
    <input type="text" name="passengers" />
    <!-- Airport pickup fields -->
    <input type="text" name="pickup" />
    <input type="text" name="dropoff" />
    <input type="text" name="arrival-date" />
    <input type="text" name="arrival-time" />
    <input type="text" name="flight-number" />
    <input type="text" name="airport-return-pickup-address" />
    <input type="text" name="airport-return-dropoff-address" />
    <input type="text" name="departing-date" />
    <input type="text" name="departing-time" />
    <!-- Event pickup fields -->
    <input type="text" name="pickup-address" />
    <input type="text" name="dropoff-address" />
    <input type="text" name="pickup-time" />
    <input type="text" name="return-pickup-address" />
    <input type="text" name="return-dropoff-address" />
    <input type="text" name="estimated-hours" />
    <!-- Add-ons -->
    <input type="text" name="travel-agent" />
    <input type="text" name="car-seats" />
    <input type="text" name="boosters" />
    <input type="text" name="age-of-children" />
    <input type="text" name="movie-choice" />
    <input type="text" name="welcome-sign-description" />
    <input type="text" name="add-on" />
    <input type="text" name="stops-yes-no" />
    <input type="text" name="stops-where" />
    <input type="text" name="travel-agency" />
  </form>

  <!-- Review form - for Netlify Forms detection at deploy time -->
  <form name="review-notification" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="review-notification" />
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="text" name="rating" />
    <input type="text" name="text" />
  </form>
</body>
</html>
